{% extends "base.html" %}
{% block content %}

<h2>Students 👨‍🎓</h2>

<div class="card">

<select id="course">
<option value="All">All</option>
<option value="BTECH">BTECH</option>
<option value="BCA">BCA</option>
</select>

<select id="dept">
<option value="All">All</option>
</select>

</div>

<br>

<div class="card">

<table>
<tr>
<th>ID</th>
<th>Name</th>
<th>Course</th>
<th>Dept</th>
<th>Photo</th>
</tr>

{% for s in data %}
<tr>
<td>{{ s[0] }}</td>
<td>{{ s[1] }}</td>
<td>{{ s[2] }}</td>
<td>{{ s[3] }}</td>

<td>
<img src="{{ url_for('static', filename='uploads/' + (s[6] or 'default.png')) }}"
width="50">
</td>
</tr>
{% endfor %}

</table>

</div>

<script>

const deptData = {
"BTECH": ["Computer Science","Data Science"],
"BCA": ["Artificial Intelligence","Data Science"]
};

let course = document.getElementById("course");
let dept = document.getElementById("dept");

course.addEventListener("change", function(){

dept.innerHTML = '<option value="All">All</option>';

if(deptData[this.value]){
deptData[this.value].forEach(d=>{
let opt = document.createElement("option");
opt.value = d;
opt.text = d;
dept.appendChild(opt);
});
}

window.location = "/view_students?course=" + this.value;

});

dept.addEventListener("change", function(){

let c = course.value;

window.location = "/view_students?course=" + c + "&dept=" + this.value;

});

</script>

{% endblock %}
