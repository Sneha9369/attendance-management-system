{% extends "base.html" %}
{% block content %}

<h2>Teachers 👩‍🏫</h2>

<div class="card">

<table>

<tr>
<th>ID</th>
<th>Name</th>
<th>Course</th>
<th>Department</th>

<th>Photo</th>
<th>Action</th>
</tr>

{% for t in data %}
<tr>

<td>{{ t[0] }}</td>
<td>{{ t[1] }}</td>
<td>{{ t[2] }}</td>
<td>{{ t[3] }}</td>



<td>
<img src="{{ url_for('static', filename='uploads/' + (t[11] or 'default.png')) }}"
width="50">
</td><td>

<a href="/teacher_profile/{{ t[0] }}">👁 View</a>

<a href="/edit_teacher/{{ t[0] }}">
<button>✏ Edit</button>
</a>

</td>

<td>
<a href="/delete_teacher/{{ t[0] }}">
<button>Delete</button>
</a>
</td>

</tr>
{% endfor %}

</table>

</div>

{% endblock %}
