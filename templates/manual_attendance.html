{% extends "base.html" %}
{% block content %}

<h2>Manual Attendance 📅</h2>

<!-- 🔥 LOAD FORM -->
<form method="GET" action="/manual_attendance">

<select name="course" id="course" onchange="loadDepartments()">
<option value="">Select Course</option>
<option value="BTECH">BTECH</option>
<option value="BCA">BCA</option>
</select>

<select name="department" id="department" onchange="loadSubjects()">
<option value="">Select Department</option>
</select>

<select name="subject" id="subject">
<option value="">Select Subject</option>
</select>

<button type="submit">Load Students</button>

</form>

<br>

<!-- 🔥 SAVE FORM -->
<form action="/save_manual_attendance" method="post">

<input type="date" name="date" required>

<input type="hidden" name="course" id="hiddenCourse">
<input type="hidden" name="department" id="hiddenDept">
<input type="hidden" name="subject" id="hiddenSubject">

<table>
<tr>
<th>Student</th>
<th>Present</th>
</tr>

{% for s in students %}
<tr>
<td>{{ s[1] }}</td>
<td><input type="checkbox" name="present" value="{{ s[0] }}"></td>
</tr>
{% endfor %}

</table>

<br>
<button type="submit">Save Attendance</button>

</form>

<!-- 🔥 JS -->
<script>
const data = {
"BTECH": {
"Computer Science": [
"Machine Learning Technique",
"Software Engineering",
"Software Project Management",
"Computer Network",
"Essence of Indian Traditional Knowledge",
"Big Data Analytics"
],
"Data Science": [
"Machine Learning Technique",
"Software Engineering",
"Software Project Management",
"Computer Network",
"Essence of Indian Traditional Knowledge",
"Big Data Analytics"
]
},
"BCA": {
"Artificial Intelligence": [
"Artificial Intelligence",
"Python",
"Java",
"Essence of Indian Traditional Knowledge",
"Database Management System"
],
"Data Science": [
"Data Science",
"Python",
"Java",
"Essence of Indian Traditional Knowledge",
"Database Management System"
]
}
};

function loadDepartments(){
let course = document.getElementById("course").value;
let dept = document.getElementById("department");

dept.innerHTML = '<option value="">Select Department</option>';

if(data[course]){
Object.keys(data[course]).forEach(d=>{
let opt = document.createElement("option");
opt.value = d;
opt.text = d;
dept.appendChild(opt);
});
}
}

function loadSubjects(){
let course = document.getElementById("course").value;
let dept = document.getElementById("department").value;
let subject = document.getElementById("subject");

subject.innerHTML = '<option value="">Select Subject</option>';

if(data[course] && data[course][dept]){
data[course][dept].forEach(s=>{
let opt = document.createElement("option");
opt.value = s;
opt.text = s;
subject.appendChild(opt);
});
}
}

// 🔥 Hidden values fill
document.querySelector("form[action='/save_manual_attendance']")
.addEventListener("submit", function(){

document.getElementById("hiddenCourse").value =
document.getElementById("course").value;

document.getElementById("hiddenDept").value =
document.getElementById("department").value;

document.getElementById("hiddenSubject").value =
document.getElementById("subject").value;

});
</script>

{% endblock %}
