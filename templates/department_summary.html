{% extends "base.html" %}
{% block content %}

<h2>Department Summary 📊</h2>

<div class="card">

<table>
<tr>
<th>Course</th>
<th>Department</th>
<th>Total Students</th>
<th>Total Teachers</th>
</tr>

{% for row in data %}
<tr>
<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
</tr>
{% endfor %}

</table>

</div>

{% endblock %}
